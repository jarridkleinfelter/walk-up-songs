<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Walk-Up Songs" />
  <meta name="theme-color" content="#0a1628" />
  <link rel="manifest" href="/manifest.json" />
  <title>KML Chargers – Walk-Up Songs</title>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0a1628;
      --navy2:  #152240;
      --navy3:  #1e3160;
      --gold:   #f5c518;
      --gold2:  #e0b000;
      --red:    #c8102e;
      --red2:   #a00c24;
      --white:  #ffffff;
      --gray:   #8a9ab5;
      --gray2:  #cdd5e0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy3) 100%);
      border-bottom: 3px solid var(--gold);
      padding: 16px 20px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    header .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2px;
    }

    header .bolt {
      font-size: 28px;
      line-height: 1;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    header p.subtitle {
      font-size: 11px;
      color: var(--gray2);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Main Layout ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* ── Add Player Card ── */
    .add-card {
      background: var(--navy2);
      border: 1px solid var(--navy3);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .add-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .field-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field-group {
      flex: 1;
      min-width: 140px;
    }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray);
      margin-bottom: 5px;
    }

    .field-group input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--navy3);
      border: 1px solid rgba(245,197,24,0.2);
      border-radius: 8px;
      color: var(--white);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field-group input[type="text"]::placeholder { color: var(--gray); }
    .field-group input[type="text"]:focus { border-color: var(--gold); }

    .btn-add {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .btn-add:active { transform: scale(0.96); }

    /* ── Section Title ── */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gray);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* ── Player Card ── */
    .player-list { display: flex; flex-direction: column; gap: 14px; }

    .player-card {
      background: var(--navy2);
      border: 1px solid var(--navy3);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .player-card.playing {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(245,197,24,0.25), var(--shadow);
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 12px;
    }

    .player-number {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
      letter-spacing: 0;
    }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-status {
      font-size: 11px;
      color: var(--gray);
      margin-top: 1px;
      height: 16px;
    }

    .player-status.ready { color: #4caf8a; }
    .player-status.partial { color: var(--gold); }
    .player-status.playing-label {
      color: var(--gold);
      font-weight: 600;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .player-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: var(--navy);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 10px rgba(245,197,24,0.3);
    }

    .btn-play:active { transform: scale(0.92); }
    .btn-play:disabled {
      background: var(--navy3);
      color: var(--gray);
      box-shadow: none;
      cursor: default;
    }

    .btn-stop {
      background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
      box-shadow: 0 2px 10px rgba(200,16,46,0.3);
    }

    .btn-delete {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(200,16,46,0.3);
      background: transparent;
      color: var(--gray);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-delete:active { background: var(--red2); color: var(--white); }

    /* ── Audio File Rows ── */
    .audio-rows {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .audio-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .audio-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray);
      width: 72px;
      flex-shrink: 0;
    }

    .audio-file-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--navy3);
      border: 1px dashed rgba(245,197,24,0.2);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }

    .audio-file-btn:active { border-color: var(--gold); }

    .audio-file-btn.has-file {
      border-style: solid;
      border-color: rgba(76,175,138,0.4);
    }

    .audio-file-icon { font-size: 14px; flex-shrink: 0; }

    .audio-file-name {
      font-size: 12px;
      color: var(--gray2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .audio-file-btn.has-file .audio-file-name { color: #4caf8a; }

    .audio-file-input { display: none; }

    /* ── Now Playing Bar ── */
    #now-playing-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
      padding: 10px 20px;
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    #now-playing-bar.visible { display: flex; }

    #now-playing-text {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
    }

    #now-playing-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
    }

    #now-playing-phase {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #btn-stop-all {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: var(--white);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30,49,96,0.97);
      border: 1px solid var(--gold);
      color: var(--white);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 300;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.3s linear;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <span class="bolt">⚡</span>
    <h1>KML Chargers</h1>
    <span class="bolt">⚡</span>
  </div>
  <p class="subtitle">Walk-Up Songs</p>
</header>

<main>
  <!-- Add Player -->
  <div class="add-card">
    <h2>⚾ Add Player</h2>
    <div class="field-row">
      <div class="field-group" style="max-width:70px">
        <label>#</label>
        <input type="text" id="input-number" placeholder="00" maxlength="3" inputmode="numeric" />
      </div>
      <div class="field-group">
        <label>Player Name</label>
        <input type="text" id="input-name" placeholder="First Last" />
      </div>
      <button class="btn-add" id="btn-add-player">+ Add</button>
    </div>
  </div>

  <!-- Roster -->
  <div class="section-title" id="roster-title" style="display:none">Roster</div>
  <div class="player-list" id="player-list">
    <div class="empty-state">
      <div class="icon">⚾</div>
      <p>No players yet.<br>Add your first player above.</p>
    </div>
  </div>
</main>

<!-- Now Playing Bar -->
<div id="now-playing-bar">
  <div id="now-playing-text">
    <div id="now-playing-name"></div>
    <div id="now-playing-phase"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
  <button id="btn-stop-all">■ Stop</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  IndexedDB helpers
// ═══════════════════════════════════════════════════
const DB_NAME = 'walkup_db';
const DB_VERSION = 1;
const STORE_PLAYERS = 'players';
const STORE_AUDIO   = 'audio_blobs';

let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_PLAYERS)) {
        d.createObjectStore(STORE_PLAYERS, { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains(STORE_AUDIO)) {
        d.createObjectStore(STORE_AUDIO);
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

function txGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function txPut(store, value, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = key !== undefined
      ? tx.objectStore(store).put(value, key)
      : tx.objectStore(store).put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function txDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function txGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
let players = [];         // [{id, number, name, announcerKey, musicKey, announcerName, musicName}]
let currentAudio = null;  // currently playing Audio object
let currentPlayerId = null;
let progressInterval = null;

// ═══════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════
function renderPlayers() {
  const list = document.getElementById('player-list');
  const title = document.getElementById('roster-title');

  if (players.length === 0) {
    title.style.display = 'none';
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚾</div>
        <p>No players yet.<br>Add your first player above.</p>
      </div>`;
    return;
  }

  title.style.display = 'block';

  list.innerHTML = players.map((p, idx) => {
    const isPlaying = p.id === currentPlayerId;
    const hasAnnouncer = !!p.announcerKey;
    const hasMusic     = !!p.musicKey;
    const isReady      = hasAnnouncer && hasMusic;
    const isPartial    = hasAnnouncer !== hasMusic;

    let statusText = '';
    let statusClass = '';
    if (isPlaying) {
      statusText = '▶ Now playing…';
      statusClass = 'playing-label';
    } else if (isReady) {
      statusText = '✓ Ready to play';
      statusClass = 'ready';
    } else if (isPartial) {
      statusText = '⚠ Missing ' + (!hasAnnouncer ? 'announcer' : 'music');
      statusClass = 'partial';
    } else {
      statusText = 'Tap below to add audio';
    }

    const displayNum = p.number ? `#${p.number}` : (idx + 1).toString();

    return `
    <div class="player-card${isPlaying ? ' playing' : ''}" data-id="${p.id}">
      <div class="player-header">
        <div class="player-number">${displayNum}</div>
        <div class="player-info">
          <div class="player-name">${escHtml(p.name)}</div>
          <div class="player-status ${statusClass}">${statusText}</div>
        </div>
        <div class="player-actions">
          <button class="btn-play ${isPlaying ? 'btn-stop' : ''}"
            onclick="handlePlay('${p.id}')"
            ${!isReady && !isPlaying ? 'disabled' : ''}
            title="${isPlaying ? 'Stop' : 'Play walk-up'}">
            ${isPlaying ? '■' : '▶'}
          </button>
          <button class="btn-delete" onclick="deletePlayer('${p.id}')" title="Remove player">✕</button>
        </div>
      </div>
      <div class="audio-rows">
        <div class="audio-row">
          <span class="audio-label">🎙 Intro</span>
          <div class="audio-file-btn ${hasAnnouncer ? 'has-file' : ''}"
               onclick="pickFile('${p.id}','announcer')">
            <span class="audio-file-icon">${hasAnnouncer ? '🔊' : '📂'}</span>
            <span class="audio-file-name">${escHtml(p.announcerName || 'Tap to add announcer audio')}</span>
          </div>
        </div>
        <div class="audio-row">
          <span class="audio-label">🎵 Music</span>
          <div class="audio-file-btn ${hasMusic ? 'has-file' : ''}"
               onclick="pickFile('${p.id}','music')">
            <span class="audio-file-icon">${hasMusic ? '🔊' : '📂'}</span>
            <span class="audio-file-name">${escHtml(p.musicName || 'Tap to add walk-up song')}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
//  Add / Delete Player
// ═══════════════════════════════════════════════════
document.getElementById('btn-add-player').addEventListener('click', addPlayer);
document.getElementById('input-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer();
});

async function addPlayer() {
  const nameInput   = document.getElementById('input-name');
  const numberInput = document.getElementById('input-number');
  const name   = nameInput.value.trim();
  const number = numberInput.value.trim();

  if (!name) { showToast('Enter a player name'); nameInput.focus(); return; }

  const player = {
    id:           crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
    number,
    name,
    announcerKey:  null,
    musicKey:      null,
    announcerName: null,
    musicName:     null,
    order:         players.length,
  };

  players.push(player);
  await txPut(STORE_PLAYERS, player);

  nameInput.value   = '';
  numberInput.value = '';
  nameInput.focus();
  renderPlayers();
  showToast(`${name} added to roster`);
}

async function deletePlayer(id) {
  const p = players.find(x => x.id === id);
  if (!p) return;

  if (currentPlayerId === id) stopAll();

  // Clean up stored audio blobs
  if (p.announcerKey) await txDelete(STORE_AUDIO, p.announcerKey).catch(()=>{});
  if (p.musicKey)     await txDelete(STORE_AUDIO, p.musicKey).catch(()=>{});
  await txDelete(STORE_PLAYERS, id);

  players = players.filter(x => x.id !== id);
  renderPlayers();
  showToast(`${p.name} removed`);
}

// ═══════════════════════════════════════════════════
//  File Picker
// ═══════════════════════════════════════════════════
function pickFile(playerId, type) {
  const input = document.createElement('input');
  input.type   = 'file';
  input.accept = 'audio/*';

  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;

    const p = players.find(x => x.id === playerId);
    if (!p) return;

    showToast('Saving audio…');

    // Delete old blob if any
    const oldKey = type === 'announcer' ? p.announcerKey : p.musicKey;
    if (oldKey) await txDelete(STORE_AUDIO, oldKey).catch(()=>{});

    const blob = new Blob([await file.arrayBuffer()], { type: file.type });
    const key  = `${playerId}_${type}_${Date.now()}`;
    await txPut(STORE_AUDIO, blob, key);

    if (type === 'announcer') {
      p.announcerKey  = key;
      p.announcerName = file.name;
    } else {
      p.musicKey  = key;
      p.musicName = file.name;
    }

    await txPut(STORE_PLAYERS, p);
    renderPlayers();
    showToast(`${type === 'announcer' ? 'Announcer' : 'Music'} saved ✓`);
  });

  input.click();
}

// ═══════════════════════════════════════════════════
//  Playback
// ═══════════════════════════════════════════════════
function stopAll() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  if (progressInterval) {
    clearInterval(progressInterval);
    progressInterval = null;
  }
  currentPlayerId = null;

  document.getElementById('now-playing-bar').classList.remove('visible');
  document.getElementById('progress-fill').style.width = '0%';
  renderPlayers();
}

async function handlePlay(id) {
  if (currentPlayerId === id) { stopAll(); return; }
  stopAll();

  const p = players.find(x => x.id === id);
  if (!p || !p.announcerKey || !p.musicKey) return;

  currentPlayerId = id;
  renderPlayers();
  updateNowPlayingBar(p.name, 'Intro…');

  // Play announcer then music
  await playBlob(p.announcerKey, p.name, 'Intro…');
  if (currentPlayerId !== id) return;   // stopped mid-way

  updateNowPlayingBar(p.name, '🎵 Walk-up Song');
  await playBlob(p.musicKey, p.name, '🎵 Walk-up Song');
  if (currentPlayerId !== id) return;

  stopAll();
}

function playBlob(key, playerName, phase) {
  return new Promise(async resolve => {
    const blob = await txGet(STORE_AUDIO, key);
    if (!blob) { resolve(); return; }

    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;

    audio.addEventListener('canplaythrough', () => {
      audio.play().catch(() => resolve());
    }, { once: true });

    audio.addEventListener('ended', () => {
      URL.revokeObjectURL(url);
      resolve();
    }, { once: true });

    audio.addEventListener('error', () => {
      URL.revokeObjectURL(url);
      resolve();
    }, { once: true });

    // progress bar
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
    }, 200);

    audio.load();
  });
}

function updateNowPlayingBar(name, phase) {
  document.getElementById('now-playing-name').textContent = name;
  document.getElementById('now-playing-phase').textContent = phase;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('now-playing-bar').classList.add('visible');
}

document.getElementById('btn-stop-all').addEventListener('click', stopAll);

// ═══════════════════════════════════════════════════
//  Init — load persisted players
// ═══════════════════════════════════════════════════
(async () => {
  db = await openDB();
  const saved = await txGetAll(STORE_PLAYERS);
  // Sort by order field
  saved.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  players = saved;
  renderPlayers();
})();
</script>

  navigator.serviceWorker.register('/sw.js').catch(() => {
    // SW may not be present when running from file:// — that's fine,
    // IndexedDB still works for audio storage.
  });
}
