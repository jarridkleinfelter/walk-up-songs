<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Walk-Up Songs" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <title>KML Chargers – Walk-Up Songs</title>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #000000;
      --navy2:  #111111;
      --navy3:  #1f1f1f;
      --gold:   #00703C;
      --gold2:  #005a30;
      --red:    #00703C;
      --red2:   #005a30;
      --white:  #ffffff;
      --gray:   #888888;
      --gray2:  #cccccc;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    header {
      background: #000000;
      border-bottom: 3px solid var(--gold);
      padding: 16px 20px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    header .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2px;
    }

    header .bolt {
      font-size: 28px;
      line-height: 1;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--white);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    header p.subtitle {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #btn-manage {
      margin-top: 10px;
      background: transparent;
      border: 1px solid rgba(0,112,60,0.45);
      border-radius: 20px;
      color: var(--gray);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    #btn-manage:active,
    #btn-manage.open { color: var(--white); border-color: var(--gold); }

    /* ── Collapsible manage panel ── */
    #manage-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease;
    }

    #manage-panel.open { max-height: 500px; }

    /* ── Main Layout ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* ── Add Player Card ── */
    .add-card {
      background: var(--navy2);
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .add-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .field-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field-group {
      flex: 1;
      min-width: 140px;
    }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray);
      margin-bottom: 5px;
    }

    .field-group input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--navy3);
      border: 1px solid rgba(0,112,60,0.3);
      border-radius: 8px;
      color: var(--white);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field-group input[type="text"]::placeholder { color: var(--gray); }
    .field-group input[type="text"]:focus { border-color: var(--gold); }

    .btn-add {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .btn-add:active { transform: scale(0.96); }

    /* ── Section Title ── */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gray);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* ── Player Card ── */
    .player-list { display: flex; flex-direction: column; gap: 14px; }

    .player-card {
      background: var(--navy2);
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .player-card.playing {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(0,112,60,0.3), var(--shadow);
    }

    .player-card.sortable-ghost { opacity: 0.35; }
    .player-card.sortable-drag  { box-shadow: 0 8px 32px rgba(0,0,0,0.8); }

    .drag-handle {
      color: var(--gray);
      font-size: 20px;
      line-height: 1;
      cursor: grab;
      padding: 4px 2px;
      flex-shrink: 0;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .drag-handle:active { cursor: grabbing; }

    .player-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 12px;
    }

    .player-number {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
      letter-spacing: 0;
    }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-status {
      font-size: 11px;
      color: var(--gray);
      margin-top: 1px;
      height: 16px;
    }

    .player-status.ready { color: #00703C; }
    .player-status.partial { color: var(--gold); }
    .player-status.playing-label {
      color: var(--gold);
      font-weight: 600;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .player-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-play {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: var(--white);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(0,112,60,0.5);
    }

    .btn-play:active { transform: scale(0.92); }
    .btn-play:disabled {
      background: var(--navy3);
      color: var(--gray);
      box-shadow: none;
      cursor: default;
    }

    .btn-stop {
      background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
      box-shadow: 0 2px 10px rgba(200,16,46,0.3);
    }

    /* ── Inline Edit Form ── */
    .player-header.edit-mode {
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 14px;
    }

    .edit-fields {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 0;
      align-items: center;
    }

    .edit-number-input {
      width: 52px;
      flex-shrink: 0;
      padding: 7px 8px;
      background: var(--navy3);
      border: 1px solid rgba(0,112,60,0.5);
      border-radius: 8px;
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
      appearance: none;
    }

    .edit-name-input {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      background: var(--navy3);
      border: 1px solid rgba(0,112,60,0.5);
      border-radius: 8px;
      color: var(--white);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .edit-number-input:focus, .edit-name-input:focus { border-color: var(--gold); }

    .btn-save-edit {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: var(--white);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-cancel-edit {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--gray);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Card Footer (edit / delete) ── */
    .card-footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-edit, .btn-delete {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--gray);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }

    .btn-edit:active  { background: rgba(255,255,255,0.08); color: var(--white); }
    .btn-delete:active { background: rgba(255,255,255,0.08); color: var(--white); }

    /* ── Audio File Rows ── */
    .audio-rows {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .audio-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .audio-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray);
      width: 72px;
      flex-shrink: 0;
    }

    .audio-file-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--navy3);
      border: 1px dashed rgba(0,112,60,0.35);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }

    .audio-file-btn:active { border-color: var(--gold); }

    .audio-file-btn.has-file {
      border-style: solid;
      border-color: rgba(0,112,60,0.6);
    }

    .audio-file-icon { font-size: 14px; flex-shrink: 0; }

    .audio-file-name {
      font-size: 12px;
      color: var(--gray2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .audio-file-btn.has-file .audio-file-name { color: #00a855; }

    .audio-file-input { display: none; }

    /* ── Music Start Timestamp ── */
    .music-start-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .music-start-input {
      width: 64px;
      padding: 6px 8px;
      background: var(--navy3);
      border: 1px solid rgba(0,112,60,0.4);
      border-radius: 8px;
      color: var(--white);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .music-start-input:focus { border-color: var(--gold); }

    .music-start-hint {
      font-size: 11px;
      color: var(--gray);
    }

    /* ── Now Playing Bar ── */
    #now-playing-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #00703C 0%, #005a30 100%);
      padding: 10px 20px;
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    #now-playing-bar.visible { display: flex; }

    #now-playing-text {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
    }

    #now-playing-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
    }

    #now-playing-phase {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #btn-stop-all {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: var(--white);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,0.95);
      border: 1px solid var(--gold);
      color: var(--white);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 300;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Import / Export ── */
    .io-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(0,112,60,0.5);
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      flex: 1;
    }

    .btn-secondary:active { background: rgba(0,112,60,0.15); }
    .btn-secondary:disabled { opacity: 0.4; cursor: default; }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.8);
      width: 0%;
      transition: width 0.3s linear;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <span class="bolt">🥎</span>
    <h1>KML Chargers</h1>
    <span class="bolt">🥎</span>
  </div>
  <p class="subtitle">Walk-Up Songs</p>
  <button id="btn-manage">⚙ Manage Roster</button>
</header>

<main>
  <!-- Collapsible manage panel -->
  <div id="manage-panel">
    <!-- Add Player -->
    <div class="add-card">
      <h2>Add Player</h2>
      <div class="field-row">
        <div class="field-group" style="max-width:90px">
          <label>Player #</label>
          <input type="text" id="input-number" placeholder="00" maxlength="3" inputmode="numeric" />
        </div>
        <div class="field-group">
          <label>Player Name</label>
          <input type="text" id="input-name" placeholder="First Last" />
        </div>
      </div>
      <div style="display:flex;justify-content:center;margin-top:12px">
        <button class="btn-add" id="btn-add-player">+ Add</button>
      </div>
    </div>

    <!-- Import / Export -->
    <div class="io-row">
      <button class="btn-secondary" id="btn-export">⬇ Export Backup</button>
      <button class="btn-secondary" id="btn-import">⬆ Import Backup</button>
      <input type="file" id="import-file-input" accept=".zip" style="display:none" />
    </div>
  </div>

  <!-- Roster -->
  <div class="section-title" id="roster-title" style="display:none">Roster</div>
  <div class="player-list" id="player-list">
    <div class="empty-state">
      <div class="icon">⚾</div>
      <p>No players yet.<br>Add your first player above.</p>
    </div>
  </div>
</main>

<!-- Now Playing Bar -->
<div id="now-playing-bar">
  <div id="now-playing-text">
    <div id="now-playing-name"></div>
    <div id="now-playing-phase"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>
  <button id="btn-stop-all">■ Stop</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  IndexedDB helpers
// ═══════════════════════════════════════════════════
const DB_NAME = 'walkup_db';
const DB_VERSION = 1;
const STORE_PLAYERS = 'players';
const STORE_AUDIO   = 'audio_blobs';

let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_PLAYERS)) {
        d.createObjectStore(STORE_PLAYERS, { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains(STORE_AUDIO)) {
        d.createObjectStore(STORE_AUDIO);
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

function txGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function txPut(store, value, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = key !== undefined
      ? tx.objectStore(store).put(value, key)
      : tx.objectStore(store).put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function txDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function txGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ═══════════════════════════════════════════════════
//  Manage panel toggle
// ═══════════════════════════════════════════════════
document.getElementById('btn-manage').addEventListener('click', () => {
  const panel = document.getElementById('manage-panel');
  const btn   = document.getElementById('btn-manage');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.textContent = open ? '✕ Close' : '⚙ Manage Roster';
});

// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
let players = [];         // [{id, number, name, announcerKey, musicKey, announcerName, musicName, musicStart}]
let currentAudio = null;  // currently playing Audio object
let currentPlayerId = null;
let progressInterval = null;
let currentClipTimer = null;
let editingPlayerId = null;
let sortableInstance = null;

// ═══════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════
function renderPlayers() {
  const list = document.getElementById('player-list');
  const title = document.getElementById('roster-title');

  if (players.length === 0) {
    title.style.display = 'none';
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚾</div>
        <p>No players yet.<br>Add your first player above.</p>
      </div>`;
    return;
  }

  title.style.display = 'block';

  list.innerHTML = players.map((p, idx) => {
    const isPlaying = p.id === currentPlayerId;
    const hasAnnouncer = !!p.announcerKey;
    const hasMusic     = !!p.musicKey;
    const isReady      = hasAnnouncer && hasMusic;
    const isPartial    = hasAnnouncer !== hasMusic;

    let statusText = '';
    let statusClass = '';
    if (isPlaying) {
      statusText = '▶ Now playing…';
      statusClass = 'playing-label';
    } else if (isReady) {
      statusText = '✓ Ready to play';
      statusClass = 'ready';
    } else if (isPartial) {
      statusText = '⚠ Missing ' + (!hasAnnouncer ? 'announcer' : 'music');
      statusClass = 'partial';
    } else {
      statusText = 'Tap below to add audio';
    }

    const displayNum = p.number ? `#${p.number}` : (idx + 1).toString();

    const isEditing = p.id === editingPlayerId;

    return `
    <div class="player-card${isPlaying ? ' playing' : ''}" data-id="${p.id}">
      <div class="player-header${isEditing ? ' edit-mode' : ''}">
        ${isEditing ? `
        <div class="edit-fields">
          <input class="edit-number-input" id="edit-num-${p.id}" type="text"
            inputmode="numeric" maxlength="3" placeholder="#"
            value="${escHtml(p.number)}" />
          <input class="edit-name-input" id="edit-name-${p.id}" type="text"
            placeholder="Player Name"
            value="${escHtml(p.name)}"
            onkeydown="if(event.key==='Enter')saveEdit('${p.id}');else if(event.key==='Escape')cancelEdit();" />
        </div>
        <div class="player-actions">
          <button class="btn-save-edit" onclick="saveEdit('${p.id}')" title="Save">✓</button>
          <button class="btn-cancel-edit" onclick="cancelEdit()" title="Cancel">✕</button>
        </div>
        ` : `
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <div class="player-number">${displayNum}</div>
        <div class="player-info">
          <div class="player-name">${escHtml(p.name)}</div>
          <div class="player-status ${statusClass}">${statusText}</div>
        </div>
        <div class="player-actions">
          <button class="btn-play ${isPlaying ? 'btn-stop' : ''}"
            onclick="handlePlay('${p.id}')"
            ${!isReady && !isPlaying ? 'disabled' : ''}
            title="${isPlaying ? 'Stop' : 'Play walk-up'}">
            ${isPlaying ? '■' : '▶'}
          </button>
        </div>
        `}
      </div>
      <div class="audio-rows">
        <div class="audio-row">
          <span class="audio-label">🎙 Intro</span>
          <div class="audio-file-btn ${hasAnnouncer ? 'has-file' : ''}"
               onclick="pickFile('${p.id}','announcer')">
            <span class="audio-file-icon">${hasAnnouncer ? '🔊' : '📂'}</span>
            <span class="audio-file-name">${escHtml(p.announcerName || 'Tap to add announcer audio')}</span>
          </div>
        </div>
        <div class="audio-row">
          <span class="audio-label">🎵 Music</span>
          <div class="audio-file-btn ${hasMusic ? 'has-file' : ''}"
               onclick="pickFile('${p.id}','music')">
            <span class="audio-file-icon">${hasMusic ? '🔊' : '📂'}</span>
            <span class="audio-file-name">${escHtml(p.musicName || 'Tap to add walk-up song')}</span>
          </div>
        </div>
        ${hasMusic ? `
        <div class="audio-row">
          <span class="audio-label">⏱ Start</span>
          <div class="music-start-wrap">
            <input class="music-start-input" type="text" inputmode="decimal"
              placeholder="0:00"
              value="${formatTime(p.musicStart || 0)}"
              onblur="saveMusicStart('${p.id}', this.value)"
              onkeydown="if(event.key==='Enter'){this.blur();}" />
            <span class="music-start-hint">plays for 7 sec</span>
          </div>
        </div>` : ''}
      </div>
      ${!isEditing ? `
      <div class="card-footer">
        <button class="btn-edit" onclick="openEdit('${p.id}')">✎ Edit</button>
        <button class="btn-delete" onclick="deletePlayer('${p.id}')">✕ Remove</button>
      </div>` : ''}
    </div>`;
  }).join('');

  initSortable();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
//  Drag-to-reorder
// ═══════════════════════════════════════════════════
function initSortable() {
  if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
  if (players.length < 2) return;

  sortableInstance = Sortable.create(document.getElementById('player-list'), {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    onEnd: async evt => {
      if (evt.oldIndex === evt.newIndex) return;
      const moved = players.splice(evt.oldIndex, 1)[0];
      players.splice(evt.newIndex, 0, moved);
      for (let i = 0; i < players.length; i++) {
        players[i].order = i;
        await txPut(STORE_PLAYERS, players[i]);
      }
    },
  });
}

// ═══════════════════════════════════════════════════
//  Add / Delete Player
// ═══════════════════════════════════════════════════
document.getElementById('btn-add-player').addEventListener('click', addPlayer);
document.getElementById('input-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer();
});

async function addPlayer() {
  const nameInput   = document.getElementById('input-name');
  const numberInput = document.getElementById('input-number');
  const name   = nameInput.value.trim();
  const number = numberInput.value.trim();

  if (!name) { showToast('Enter a player name'); nameInput.focus(); return; }

  const player = {
    id:           crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
    number,
    name,
    announcerKey:  null,
    musicKey:      null,
    announcerName: null,
    musicName:     null,
    musicStart:    0,
    order:         players.length,
  };

  players.push(player);
  await txPut(STORE_PLAYERS, player);

  nameInput.value   = '';
  numberInput.value = '';
  nameInput.focus();
  renderPlayers();
  showToast(`${name} added to roster`);
}

async function deletePlayer(id) {
  const p = players.find(x => x.id === id);
  if (!p) return;

  if (currentPlayerId === id) stopAll();

  // Clean up stored audio blobs
  if (p.announcerKey) await txDelete(STORE_AUDIO, p.announcerKey).catch(()=>{});
  if (p.musicKey)     await txDelete(STORE_AUDIO, p.musicKey).catch(()=>{});
  await txDelete(STORE_PLAYERS, id);

  players = players.filter(x => x.id !== id);
  renderPlayers();
  showToast(`${p.name} removed`);
}

// ═══════════════════════════════════════════════════
//  File Picker
// ═══════════════════════════════════════════════════
function pickFile(playerId, type) {
  const input = document.createElement('input');
  input.type   = 'file';
  input.accept = 'audio/*';

  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;

    const p = players.find(x => x.id === playerId);
    if (!p) return;

    showToast('Saving audio…');

    // Delete old blob if any
    const oldKey = type === 'announcer' ? p.announcerKey : p.musicKey;
    if (oldKey) await txDelete(STORE_AUDIO, oldKey).catch(()=>{});

    const blob = new Blob([await file.arrayBuffer()], { type: file.type });
    const key  = `${playerId}_${type}_${Date.now()}`;
    await txPut(STORE_AUDIO, blob, key);

    if (type === 'announcer') {
      p.announcerKey  = key;
      p.announcerName = file.name;
    } else {
      p.musicKey  = key;
      p.musicName = file.name;
    }

    await txPut(STORE_PLAYERS, p);
    renderPlayers();
    showToast(`${type === 'announcer' ? 'Announcer' : 'Music'} saved ✓`);
  });

  input.click();
}

// ═══════════════════════════════════════════════════
//  Playback
// ═══════════════════════════════════════════════════
function stopAll() {
  if (currentClipTimer) {
    clearTimeout(currentClipTimer);
    currentClipTimer = null;
  }
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  if (progressInterval) {
    clearInterval(progressInterval);
    progressInterval = null;
  }
  currentPlayerId = null;

  document.getElementById('now-playing-bar').classList.remove('visible');
  document.getElementById('progress-fill').style.width = '0%';
  renderPlayers();
}

async function handlePlay(id) {
  if (currentPlayerId === id) { stopAll(); return; }
  stopAll();

  const p = players.find(x => x.id === id);
  if (!p || !p.announcerKey || !p.musicKey) return;

  currentPlayerId = id;
  renderPlayers();
  updateNowPlayingBar(p.name, 'Intro…');

  // Play announcer (full), then music clip (startTime → +7 s)
  await playBlob(p.announcerKey);
  if (currentPlayerId !== id) return;   // stopped mid-way

  updateNowPlayingBar(p.name, '🎵 Walk-up Song');
  await playBlob(p.musicKey, { startTime: p.musicStart || 0, clipDuration: 7 });
  if (currentPlayerId !== id) return;

  stopAll();
}

function playBlob(key, { startTime = 0, clipDuration = null } = {}) {
  return new Promise(async resolve => {
    const blob = await txGet(STORE_AUDIO, key);
    if (!blob) { resolve(); return; }

    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;

    function cleanup() {
      if (currentClipTimer) { clearTimeout(currentClipTimer); currentClipTimer = null; }
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
      URL.revokeObjectURL(url);
      resolve();
    }

    audio.addEventListener('canplaythrough', () => {
      audio.volume = 1;
      if (startTime > 0) audio.currentTime = startTime;

      audio.play().catch(() => cleanup());

      // Stop after clipDuration seconds if specified
      if (clipDuration !== null) {
        currentClipTimer = setTimeout(() => {
          audio.volume = 1;
          audio.pause();
          cleanup();
        }, clipDuration * 1000);
      }
    }, { once: true });

    audio.addEventListener('ended', cleanup, { once: true });
    audio.addEventListener('error', cleanup, { once: true });

    // Progress bar + fade-out over last 2 s of a clip
    const FADE_DURATION = 2;
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (clipDuration !== null) {
        const elapsed = Math.max(0, audio.currentTime - startTime);
        document.getElementById('progress-fill').style.width =
          Math.min((elapsed / clipDuration) * 100, 100) + '%';

        const fadeStart = clipDuration - FADE_DURATION;
        if (elapsed >= fadeStart) {
          audio.volume = Math.max(0, 1 - (elapsed - fadeStart) / FADE_DURATION);
        }
      } else {
        if (!audio.duration) return;
        document.getElementById('progress-fill').style.width =
          (audio.currentTime / audio.duration) * 100 + '%';
      }
    }, 50);

    audio.load();
  });
}

function updateNowPlayingBar(name, phase) {
  document.getElementById('now-playing-name').textContent = name;
  document.getElementById('now-playing-phase').textContent = phase;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('now-playing-bar').classList.add('visible');
}

document.getElementById('btn-stop-all').addEventListener('click', stopAll);

// ═══════════════════════════════════════════════════
//  Music Start Timestamp
// ═══════════════════════════════════════════════════
function formatTime(secs) {
  secs = Math.max(0, secs || 0);
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function parseTimestamp(val) {
  val = String(val).trim();
  if (val.includes(':')) {
    const [mPart, sPart] = val.split(':');
    return Math.max(0, (parseInt(mPart, 10) || 0) * 60 + (parseFloat(sPart) || 0));
  }
  return Math.max(0, parseFloat(val) || 0);
}

async function saveMusicStart(id, val) {
  const p = players.find(x => x.id === id);
  if (!p) return;
  const seconds = parseTimestamp(val);
  p.musicStart = seconds;
  await txPut(STORE_PLAYERS, p);
  // Normalize the displayed value without a full re-render
  const inputs = document.querySelectorAll('.music-start-input');
  inputs.forEach(input => {
    if (input.closest('.player-card[data-id="' + id + '"]')) {
      input.value = formatTime(seconds);
    }
  });
}

// ═══════════════════════════════════════════════════
//  Edit Player
// ═══════════════════════════════════════════════════
function openEdit(id) {
  editingPlayerId = id;
  renderPlayers();
  // Focus the name field after render
  const nameInput = document.getElementById(`edit-name-${id}`);
  if (nameInput) { nameInput.focus(); nameInput.select(); }
}

function cancelEdit() {
  editingPlayerId = null;
  renderPlayers();
}

async function saveEdit(id) {
  const p = players.find(x => x.id === id);
  if (!p) return;

  const nameVal = document.getElementById(`edit-name-${id}`)?.value.trim();
  if (!nameVal) { showToast('Player name cannot be empty'); return; }

  const numVal = document.getElementById(`edit-num-${id}`)?.value.trim();

  p.name   = nameVal;
  p.number = numVal;
  await txPut(STORE_PLAYERS, p);

  editingPlayerId = null;
  renderPlayers();
  showToast(`${nameVal} updated ✓`);
}

// ═══════════════════════════════════════════════════
//  Import / Export
// ═══════════════════════════════════════════════════
document.getElementById('btn-export').addEventListener('click', exportData);
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('import-file-input').click();
});
document.getElementById('import-file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (file) await importData(file);
});

async function exportData() {
  if (players.length === 0) { showToast('No roster to export'); return; }

  const btn = document.getElementById('btn-export');
  btn.disabled = true;
  showToast('Preparing export…');

  try {
    const zip = new JSZip();
    zip.file('players.json', JSON.stringify(players, null, 2));

    const audioFolder = zip.folder('audio');
    for (const p of players) {
      for (const [, key] of [['announcer', p.announcerKey], ['music', p.musicKey]]) {
        if (key) {
          const blob = await txGet(STORE_AUDIO, key);
          if (blob) audioFolder.file(key, blob);
        }
      }
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    a.download = `walkup-songs-${new Date().toISOString().slice(0, 10)}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Export complete ✓');
  } catch (err) {
    console.error('Export error:', err);
    showToast('Export failed');
  } finally {
    btn.disabled = false;
  }
}

async function importData(file) {
  if (!confirm('This will replace ALL current roster data and audio. Continue?')) return;

  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  showToast('Importing…');

  try {
    const zip = await JSZip.loadAsync(file);

    const playersFile = zip.file('players.json');
    if (!playersFile) { showToast('Invalid backup — missing players.json'); btn.disabled = false; return; }

    const importedPlayers = JSON.parse(await playersFile.async('string'));
    if (!Array.isArray(importedPlayers)) throw new Error('players.json is not an array');

    stopAll();

    // Clear existing data
    for (const p of [...players]) {
      if (p.announcerKey) await txDelete(STORE_AUDIO, p.announcerKey).catch(() => {});
      if (p.musicKey)     await txDelete(STORE_AUDIO, p.musicKey).catch(() => {});
      await txDelete(STORE_PLAYERS, p.id).catch(() => {});
    }

    // Restore audio blobs
    const audioFiles = Object.values(zip.files).filter(f => f.name.startsWith('audio/') && !f.dir);
    for (const zipFile of audioFiles) {
      const blob = await zipFile.async('blob');
      const key = zipFile.name.slice('audio/'.length);
      if (key) await txPut(STORE_AUDIO, blob, key);
    }

    // Restore players
    for (const player of importedPlayers) {
      await txPut(STORE_PLAYERS, player);
    }

    // Reload state
    const saved = await txGetAll(STORE_PLAYERS);
    saved.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    players = saved;
    renderPlayers();
    showToast(`Imported ${players.length} player${players.length !== 1 ? 's' : ''} ✓`);
  } catch (err) {
    console.error('Import error:', err);
    showToast('Import failed — invalid file');
  } finally {
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════
//  Init — load persisted players
// ═══════════════════════════════════════════════════
(async () => {
  db = await openDB();
  const saved = await txGetAll(STORE_PLAYERS);
  // Sort by order field
  saved.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  players = saved;
  renderPlayers();
})();
</script>

  });
}
